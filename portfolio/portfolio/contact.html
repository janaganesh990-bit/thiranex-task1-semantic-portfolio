<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana Portfolio | Contact</title>
    <meta name="description" content="Contact Jana">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="site-header">
    <h1>Contact Me</h1>

    <nav aria-label="Main Navigation">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
</header>

<main id="main-content" class="container">

    <section class="card contact-section">
        <h2>Get in Touch</h2>
        <p>
            Have a project, collaboration, or opportunity? Feel free to reach out.
        </p>

        <form aria-label="Contact Form">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter your name" required>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter your email" required>

            <label for="message">Message</label>
            <textarea
                id="message"
                rows="6"
                placeholder="Write your message here..."
                required
            ></textarea>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

</main>

<footer>
    <p>&copy; 2026 Jana. All Rights Reserved.</p>
</footer>

<script src="../js/theme.js"></script>
</body>
</html>
